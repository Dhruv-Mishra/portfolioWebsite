name: Deploy Portfolio

on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Site config name (matches /etc/deploy/sites/<name>.conf)'
        required: false
        default: portfolio
        type: string
      skip_git:
        description: 'Skip git pull (use code already on server)'
        required: false
        default: false
        type: boolean
      skip_deps:
        description: 'Skip npm ci (code-only change, no package updates)'
        required: false
        default: false
        type: boolean
      skip_build:
        description: 'Skip npm build (only update nginx config)'
        required: false
        default: false
        type: boolean
      skip_nginx:
        description: 'Skip nginx config update & reload'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force deployment (ignore uncommitted changes)'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'
      - '.github/agents/**'
      - '.github/instructions/**'
      - 'LICENSE'
      - 'ResumeBuilder/**'

concurrency:
  group: deploy-${{ inputs.site || 'portfolio' }}
  cancel-in-progress: false

env:
  DOMAIN: whoisdhruv.com
  DEPLOY_CMD: deployWebsite

jobs:
  deploy:
    name: Deploy to ${{ matrix.server.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        server:
          - name: production-1
            host_secret: SERVER_HOST_1
            user_secret: SERVER_USERNAME_1
            key_secret: SERVER_SSH_KEY_1
            port_secret: SERVER_PORT_1
          - name: production-2
            host_secret: SERVER_HOST_2
            user_secret: SERVER_USERNAME_2
            key_secret: SERVER_SSH_KEY_2
            port_secret: SERVER_PORT_2
          - name: production-3
            host_secret: SERVER_HOST_3
            user_secret: SERVER_USERNAME_3
            key_secret: SERVER_SSH_KEY_3
            port_secret: SERVER_PORT_3

    environment:
      name: ${{ matrix.server.name }}
      url: https://${{ env.DOMAIN }}

    steps:
      - name: Deployment Started (${{ matrix.server.name }})
        run: |
          echo "## 🚀 Deployment — ${{ matrix.server.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ matrix.server.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | ${{ inputs.site || 'portfolio' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check server secrets exist
        run: |
          if [ -z "${{ secrets[matrix.server.host_secret] }}" ]; then
            echo "::warning::Secret ${{ matrix.server.host_secret }} not configured — skipping ${{ matrix.server.name }}"
            echo "SKIP_SERVER=true" >> $GITHUB_ENV
          fi

      - name: Deploy to ${{ matrix.server.name }}
        if: env.SKIP_SERVER != 'true'
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.user_secret] }}
          key: ${{ secrets[matrix.server.key_secret] }}
          port: ${{ secrets[matrix.server.port_secret] }}
          script_stop: true
          command_timeout: 12m
          script: |
            echo "🚀 Deploying to ${{ matrix.server.name }}..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if ! command -v ${{ env.DEPLOY_CMD }} &>/dev/null; then
              echo "❌ '${{ env.DEPLOY_CMD }}' not found."
              echo ""
              echo "Setup (run once per machine):"
              echo "  sudo ln -sf /path/to/portfolio/scripts/deploy.sh /usr/local/bin/${{ env.DEPLOY_CMD }}"
              exit 1
            fi

            DEPLOY="sudo NEXT_BUILD_ID=${{ github.sha }} ${{ env.DEPLOY_CMD }}"
            DEPLOY="$DEPLOY --site ${{ inputs.site || 'portfolio' }}"

            if [ "${{ inputs.skip_git }}" = "true" ]; then
              DEPLOY="$DEPLOY --skip-git"
            fi
            if [ "${{ inputs.skip_deps }}" = "true" ]; then
              DEPLOY="$DEPLOY --skip-deps"
            fi
            if [ "${{ inputs.skip_build }}" = "true" ]; then
              DEPLOY="$DEPLOY --skip-build"
            fi
            if [ "${{ inputs.skip_nginx }}" = "true" ]; then
              DEPLOY="$DEPLOY --skip-nginx"
            fi
            if [ "${{ inputs.force }}" = "true" ]; then
              DEPLOY="$DEPLOY --force"
            fi

            echo "Command: $DEPLOY"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            $DEPLOY
            echo ""
            echo "✅ ${{ matrix.server.name }}: Deployment completed!"

      - name: Verify Deployment (${{ matrix.server.name }})
        if: success() && env.SKIP_SERVER != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.user_secret] }}
          key: ${{ secrets[matrix.server.key_secret] }}
          port: ${{ secrets[matrix.server.port_secret] }}
          command_timeout: 2m
          script: |
            echo "🔍 Post-deploy verification..."

            SITE="${{ inputs.site || 'portfolio' }}"
            SITE_CONF="/etc/deploy/sites/${SITE}.conf"

            # Read service name and port from config
            SVC_NAME="portfolio"
            SVC_PORT="3000"
            if [ -f "$SITE_CONF" ]; then
              SVC_NAME=$(grep '^SERVICE_NAME=' "$SITE_CONF" | cut -d= -f2 | tr -d '"' || echo "portfolio")
              SVC_PORT=$(grep '^NEXTJS_PORT=' "$SITE_CONF" | cut -d= -f2 | tr -d '"' || echo "3000")
            fi

            # Check systemd service
            if sudo systemctl is-active --quiet "$SVC_NAME"; then
              echo "✅ ${SVC_NAME}.service is running"
            else
              echo "❌ ${SVC_NAME}.service is NOT running"
              sudo journalctl -u "$SVC_NAME" --no-pager -n 10
              exit 1
            fi

            # Check Next.js responds
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "http://127.0.0.1:${SVC_PORT}/" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Next.js responding (HTTP $HTTP_CODE on port $SVC_PORT)"
            else
              echo "⚠️  Next.js returned HTTP $HTTP_CODE"
            fi

            # Check nginx
            if sudo systemctl is-active --quiet nginx; then
              echo "✅ nginx is running"
            else
              echo "❌ nginx is NOT running"
              exit 1
            fi

            # Disk usage
            echo ""
            echo "📊 Disk usage:"
            df -h / | tail -1 | awk '{print "   Used: "$3" / "$2" ("$5" full)"}'

            # Memory usage
            echo "📊 Memory:"
            free -h | awk '/Mem:/{print "   RAM: "$3" used / "$2" total"}'
            free -h | awk '/Swap:/{print "   Swap: "$3" used / "$2" total"}'

      - name: Deployment Success (${{ matrix.server.name }})
        if: success() && env.SKIP_SERVER != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ ${{ matrix.server.name }}: Success" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [https://${{ env.DOMAIN }}](https://${{ env.DOMAIN }})" >> $GITHUB_STEP_SUMMARY

      - name: Server Skipped (${{ matrix.server.name }})
        if: env.SKIP_SERVER == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⏭️ ${{ matrix.server.name }}: Skipped (secrets not configured)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Failed (${{ matrix.server.name }})
        if: failure()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ❌ ${{ matrix.server.name }}: Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Troubleshooting:**" >> $GITHUB_STEP_SUMMARY
          SITE="${{ inputs.site || 'portfolio' }}"
          echo "1. SSH in and check: \`/var/log/${SITE}-deploy/\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Service status: \`sudo systemctl status ${SITE}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Recent logs: \`sudo journalctl -u ${SITE} --no-pager -n 50\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Run manually: \`sudo deployWebsite --site ${SITE}\`" >> $GITHUB_STEP_SUMMARY
