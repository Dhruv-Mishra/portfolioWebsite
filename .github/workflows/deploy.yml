name: Deploy Portfolio

# ─────────────────────────────────────────────────────────────────────────────
# Architecture: build-once-deploy-many
#
#   build job (ubuntu-latest, once)
#     └── npm ci → lint → test → next build → assemble standalone →
#         tar czf portfolio-<sha>.tar.gz with deploy.sh bundled inside
#
#   deploy job (matrix, 3 VMs in parallel, needs: build)
#     └── download artifact → scp tarball to VM → ssh extract →
#         invoke deploy.sh from WITHIN the artifact → health-check
#
# Why bundle deploy.sh inside the artifact:
#   - Single-commit self-bootstrapping: the first push with this new workflow
#     ships the new deploy.sh alongside the build. The VM extracts it from the
#     tarball and runs it. No "update deploy.sh from git first" dance needed.
#   - Hermetic reproducibility: deploy.sh version is always locked to bundle
#     version. Impossible for them to drift.
#
# Why no arch matrix:
#   - sharp has been disabled (images.unoptimized=true in next.config.ts).
#   - The resulting standalone bundle is pure JavaScript + pre-optimized
#     webp assets, portable across arm64/x86_64 Linux VMs.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Site config name (matches /etc/deploy/sites/<name>.conf)'
        required: false
        default: portfolio
        type: string
      skip_nginx:
        description: 'Skip nginx config update & reload'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'
      - '.github/agents/**'
      - '.github/instructions/**'
      - 'LICENSE'
      - 'ResumeBuilder/**'

concurrency:
  group: deploy-${{ inputs.site || 'portfolio' }}
  cancel-in-progress: false

env:
  DOMAIN: whoisdhruv.com
  NODE_VERSION: '22'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # BUILD — runs once on ubuntu-latest, produces a single artifact
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: portfolio
        # SKIP_EMBEDDINGS_BUILD=1 tells the prebuild hook to reuse the committed
        # lib/facts.embeddings.json rather than hitting the embeddings API.
        # Avoids needing LLM_API_KEY as an Actions secret.
        env:
          SKIP_EMBEDDINGS_BUILD: '1'
        run: npm ci

      - name: Lint
        working-directory: portfolio
        run: npm run lint

      - name: Test
        working-directory: portfolio
        run: npm test

      - name: Build Next.js (standalone)
        working-directory: portfolio
        env:
          SKIP_EMBEDDINGS_BUILD: '1'
          NEXT_BUILD_ID: ${{ github.sha }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build

      - name: Assemble standalone bundle
        working-directory: portfolio
        run: |
          set -euo pipefail

          # Next.js standalone omits static/ and public/ — copy them in
          cp -r .next/static .next/standalone/.next/
          cp -r public        .next/standalone/

          # Ship deploy.sh + nginx template INSIDE the artifact at .deploy/
          # so the VM can invoke it directly without a separate git pull.
          mkdir -p .next/standalone/.deploy
          cp scripts/deploy.sh          .next/standalone/.deploy/
          cp nginx-cloudflare.conf      .next/standalone/.deploy/
          chmod +x .next/standalone/.deploy/deploy.sh

          # Build metadata — useful for forensics if a deploy goes sideways
          cat > .next/standalone/.deploy/meta.json <<META
          {
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}"
          }
          META

          # Package. Contents extract to the root of whatever dir you untar into.
          tar czf ../portfolio-${{ github.sha }}.tar.gz -C .next/standalone .

          ls -lh ../portfolio-${{ github.sha }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-bundle
          path: portfolio-${{ github.sha }}.tar.gz
          retention-days: 14
          if-no-files-found: error

      - name: Build summary
        run: |
          SIZE=$(ls -l portfolio-${{ github.sha }}.tar.gz | awk '{print $5}')
          SIZE_MB=$(( SIZE / 1024 / 1024 ))
          echo "## 📦 Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | portfolio-${{ github.sha }}.tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # DEPLOY — parallel matrix across all VMs, consumes the build artifact
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ matrix.server.name }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    strategy:
      fail-fast: false
      matrix:
        server:
          - name: production-1
            host_secret: SERVER_HOST_1
            user_secret: SERVER_USERNAME_1
            key_secret: SERVER_SSH_KEY_1
            port_secret: SERVER_PORT_1
          - name: production-2
            host_secret: SERVER_HOST_2
            user_secret: SERVER_USERNAME_2
            key_secret: SERVER_SSH_KEY_2
            port_secret: SERVER_PORT_2
          - name: production-3
            host_secret: SERVER_HOST_3
            user_secret: SERVER_USERNAME_3
            key_secret: SERVER_SSH_KEY_3
            port_secret: SERVER_PORT_3

    environment:
      name: ${{ matrix.server.name }}
      url: https://${{ env.DOMAIN }}

    steps:
      - name: Deployment Started (${{ matrix.server.name }})
        run: |
          echo "## 🚀 Deployment — ${{ matrix.server.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ matrix.server.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | ${{ inputs.site || 'portfolio' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | artifact |" >> $GITHUB_STEP_SUMMARY

      - name: Check server secrets exist
        run: |
          if [ -z "${{ secrets[matrix.server.host_secret] }}" ]; then
            echo "::warning::Secret ${{ matrix.server.host_secret }} not configured — skipping ${{ matrix.server.name }}"
            echo "SKIP_SERVER=true" >> $GITHUB_ENV
          fi

      - name: Download build artifact
        if: env.SKIP_SERVER != 'true'
        uses: actions/download-artifact@v4
        with:
          name: portfolio-bundle

      - name: Copy artifact to VM
        if: env.SKIP_SERVER != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.user_secret] }}
          key: ${{ secrets[matrix.server.key_secret] }}
          port: ${{ secrets[matrix.server.port_secret] }}
          source: portfolio-${{ github.sha }}.tar.gz
          target: /tmp/
          timeout: 60s
          command_timeout: 3m

      - name: Deploy on ${{ matrix.server.name }}
        if: env.SKIP_SERVER != 'true'
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.user_secret] }}
          key: ${{ secrets[matrix.server.key_secret] }}
          port: ${{ secrets[matrix.server.port_secret] }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail

            SHA="${{ github.sha }}"
            SITE="${{ inputs.site || 'portfolio' }}"
            TARBALL="/tmp/portfolio-${SHA}.tar.gz"
            STAGING="/tmp/portfolio-stage-${SHA}"

            # Cleanup trap — always remove staging, and remove tarball on success.
            # (On failure, keep tarball at /tmp for forensics; it'll age out
            # naturally via tmp cleanup or be overwritten on retry.)
            DEPLOY_OK=0
            cleanup_staging() {
              sudo rm -rf "$STAGING" 2>/dev/null || true
              if [ "$DEPLOY_OK" = "1" ]; then
                sudo rm -f "$TARBALL" 2>/dev/null || true
              fi
            }
            trap cleanup_staging EXIT

            echo "🚀 Artifact deploy to ${{ matrix.server.name }}"
            echo "   SHA:  ${SHA}"
            echo "   Site: ${SITE}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            [ -f "$TARBALL" ] || { echo "❌ Tarball missing at $TARBALL"; exit 1; }

            # Extract into staging dir. Using rm -rf + mkdir -p covers the case
            # where a prior failed deploy left behind a half-extracted staging.
            sudo rm -rf "$STAGING"
            sudo mkdir -p "$STAGING"
            sudo tar xzf "$TARBALL" -C "$STAGING"

            # Sanity: must contain both the bundle and the deploy scripts.
            [ -f "$STAGING/server.js" ] || { echo "❌ server.js missing — artifact corrupt"; exit 1; }
            [ -f "$STAGING/.deploy/deploy.sh" ] || { echo "❌ .deploy/deploy.sh missing — artifact corrupt"; exit 1; }

            sudo chmod +x "$STAGING/.deploy/deploy.sh"

            # Optional pass-throughs. Currently only skip_nginx is exposed as
            # a workflow input — the other legacy flags (skip_git/deps/build,
            # force) are meaningless in artifact mode.
            EXTRA_FLAGS=""
            if [ "${{ inputs.skip_nginx || 'false' }}" = "true" ]; then
              EXTRA_FLAGS="$EXTRA_FLAGS --skip-nginx"
            fi

            # Invoke the deploy.sh that shipped with THIS build. The script
            # handles first-run bootstrap (creating /opt/portfolio/ if needed,
            # migrating .env.local from the legacy location, etc).
            sudo bash "$STAGING/.deploy/deploy.sh" \
              --release-dir "$STAGING" \
              --sha "$SHA" \
              --site "$SITE" \
              $EXTRA_FLAGS

            DEPLOY_OK=1
            echo ""
            echo "✅ ${{ matrix.server.name }}: Deployment completed!"

      - name: Verify Deployment (${{ matrix.server.name }})
        if: success() && env.SKIP_SERVER != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[matrix.server.host_secret] }}
          username: ${{ secrets[matrix.server.user_secret] }}
          key: ${{ secrets[matrix.server.key_secret] }}
          port: ${{ secrets[matrix.server.port_secret] }}
          command_timeout: 2m
          script: |
            set -euo pipefail

            SITE="${{ inputs.site || 'portfolio' }}"
            SITE_CONF="/etc/deploy/sites/${SITE}.conf"

            SVC_NAME="portfolio"
            SVC_PORT="3000"
            if [ -f "$SITE_CONF" ]; then
              SVC_NAME=$(grep '^SERVICE_NAME=' "$SITE_CONF" | cut -d= -f2 | tr -d '"' || echo "portfolio")
              SVC_PORT=$(grep '^NEXTJS_PORT=' "$SITE_CONF"  | cut -d= -f2 | tr -d '"' || echo "3000")
            fi

            echo "🔍 Post-deploy verification for $SVC_NAME"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # systemd health
            if sudo systemctl is-active --quiet "$SVC_NAME"; then
              echo "✅ ${SVC_NAME}.service is running"
            else
              echo "❌ ${SVC_NAME}.service is NOT running"
              sudo journalctl -u "$SVC_NAME" --no-pager -n 20
              exit 1
            fi

            # Next.js HTTP health
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 \
              "http://127.0.0.1:${SVC_PORT}/" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Next.js responding (HTTP $HTTP_CODE on :$SVC_PORT)"
            else
              echo "⚠️  Next.js returned HTTP $HTTP_CODE (expected 200)"
            fi

            # nginx health
            if sudo systemctl is-active --quiet nginx; then
              echo "✅ nginx is running"
            else
              echo "❌ nginx is NOT running"
              exit 1
            fi

            # Verify current release matches the deployed SHA
            DEPLOY_ROOT="/opt/${SVC_NAME}"
            if [ -L "$DEPLOY_ROOT/current" ]; then
              CURRENT_SHA=$(basename "$(readlink -f "$DEPLOY_ROOT/current")")
              if [ "$CURRENT_SHA" = "${{ github.sha }}" ]; then
                echo "✅ current → ${CURRENT_SHA:0:12} (matches deployed SHA)"
              else
                echo "⚠️  current → ${CURRENT_SHA} but deployed SHA is ${{ github.sha }}"
              fi
              RELEASE_COUNT=$(find "$DEPLOY_ROOT/releases" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
              echo "📦 Releases on disk: $RELEASE_COUNT"
            fi

            # Resource snapshot
            echo ""
            echo "📊 Disk:"
            df -h / | tail -1 | awk '{print "   Used: "$3" / "$2" ("$5" full)"}'
            echo "📊 Memory:"
            free -h | awk '/Mem:/{print  "   RAM:  "$3" used / "$2" total"}'
            free -h | awk '/Swap:/{print "   Swap: "$3" used / "$2" total"}'

      - name: Deployment Success (${{ matrix.server.name }})
        if: success() && env.SKIP_SERVER != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ ${{ matrix.server.name }}: Success" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [https://${{ env.DOMAIN }}](https://${{ env.DOMAIN }})" >> $GITHUB_STEP_SUMMARY

      - name: Server Skipped (${{ matrix.server.name }})
        if: env.SKIP_SERVER == 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⏭️ ${{ matrix.server.name }}: Skipped (secrets not configured)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment Failed (${{ matrix.server.name }})
        if: failure()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ❌ ${{ matrix.server.name }}: Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Troubleshooting (requires SSH access — if none, open a new workflow run):**" >> $GITHUB_STEP_SUMMARY
          SITE="${{ inputs.site || 'portfolio' }}"
          echo "1. Deploy logs:     \`sudo ls -lt /var/log/${SITE}-deploy/ | head\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Service status:  \`sudo systemctl status ${SITE}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Journal:         \`sudo journalctl -u ${SITE} --no-pager -n 80\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Current release: \`ls -la /opt/${SITE}/current\`" >> $GITHUB_STEP_SUMMARY
          echo "5. Release history: \`ls -lt /opt/${SITE}/releases/\`" >> $GITHUB_STEP_SUMMARY
          echo "6. nginx test:      \`sudo nginx -t\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback (if the automatic rollback didn't fire):**" >> $GITHUB_STEP_SUMMARY
          echo "Re-run the workflow on the last known-good SHA — the deploy script will flip the symlink back to that release dir if it's still on disk." >> $GITHUB_STEP_SUMMARY
